<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="轻松记账" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#409eff" />
    <title>轻松记账</title>
    <!-- 兜底：如果 JS 加载失败，至少显示提示文字 -->
    <style>
      #loading-fallback {
        display: none;
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center; font-family: sans-serif; color: #909399;
      }
      #loading-fallback.show { display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading-fallback">
        <p style="font-size:40px;margin:0 0 12px">⏳</p>
        <p style="margin:0">加载中...如果长时间无反应，请检查网络</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // 3秒后还没渲染就是出问题了
      setTimeout(function() {
        var app = document.getElementById('app')
        var fb = document.getElementById('loading-fallback')
        if (app && app.children.length <= 1 && fb) {
          fb.classList.add('show')
        }
      }, 3000)
    </script>
  </body>
</html>
